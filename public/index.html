<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitForge</title>
<meta name="theme-color" content="#0b1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app">
  <div class="splash"><div class="splash-glow"></div><div class="splash-icon">🔥</div><div class="splash-title">FitForge</div><div class="splash-sub">Loading your journey...</div><div class="splash-loader"><div class="splash-bar"></div></div></div>
</div>
<nav class="nav"><div class="nav-inner">
  <button class="nav-btn active" data-page="today" onclick="switchPage('today')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22c4-2.5 7-6 7-10.5 0-3-2-5.5-4-7.5-.5 2.5-2 4-4 5.5C9 7.5 8 5 7.5 3 5.5 5 3 8 3 11.5 3 16 6 19.5 12 22z"/></svg><span>Today</span></button>
  <button class="nav-btn" data-page="calendar" onclick="switchPage('calendar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Plan</span></button>
  <button class="nav-btn" data-page="food" onclick="switchPage('food')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><path d="M6 1v3M10 1v3M14 1v3"/></svg><span>Food</span></button>
  <button class="nav-btn" data-page="medical" onclick="switchPage('medical')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>Health</span></button>
  <button class="nav-btn" data-page="progress" onclick="switchPage('progress')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span>Stats</span></button>
  <button class="nav-btn" data-page="profile" onclick="switchPage('profile')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Me</span></button>
</div></nav>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
